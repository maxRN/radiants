app = 'radiants-abs'
primary_region = 'fra'
swap_size_mb = 512

[build]
  dockerfile = 'Dockerfile'

[env]
  CONFIG_PATH = '/data/config'
  METADATA_PATH = '/data/metadata'
  BACKUP_PATH = '/data/metadata/backups'
  REFRESH_TOKEN_EXPIRY = '3628800'
  TZ = 'Europe/Berlin'
  RCLONE_CONFIG_BOX_TYPE = 'sftp'
  RCLONE_CONFIG_BOX_HOST = 'u462951.your-storagebox.de'
  RCLONE_CONFIG_BOX_USER = 'u462951'
  RCLONE_CONFIG_BOX_PORT = '23'
  RCLONE_CONFIG_BOX_KEY_FILE = '/root/.ssh/id_ed25519'
  RCLONE_CONFIG_BOX_SHELL_TYPE = 'unix'

[[mounts]]
  source = 'abs_migrate'
  destination = '/data'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '15s'
    grace_period = '60s'
    method = 'GET'
    path = '/healthcheck'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
